aid: prompt-armor
url: https://raw.githubusercontent.com/api-evangelist/prompt-armor/refs/heads/main/apis.yml
name: PromptArmor
kind: company
description: PromptArmor (YC W24) is an LLM application security platform that detects
  and blocks enterprise-grade threats - indirect prompt injection, data exfiltration,
  phishing, and system manipulation - in production AI applications. A real-time
  detection API analyzes LLM inputs and outputs against a continuously updated set
  of threat detectors before a completion is acted on, returning a fast verdict
  (for example containsInjection) so applications can block or allow content.
